name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-gcc:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq cmake ninja-build qt6-base-dev \
            qt6-declarative-dev qt6-tools-dev curl jq g++ lcov

      - name: Download lingmo-theme
        run: |
          ASSETS=$(curl -s https://api.github.com/repos/Matrinsoft/lingmo-theme/releases/latest \
            | jq -r '.assets[] | select(.name | test("^liblingmotheme(1|-dev)") and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do
            curl -sL "$url" -o "/tmp/$(basename $url)"
          done
          dpkg -i /tmp/liblingmotheme*.deb 2>/dev/null || apt-get install -y -f

      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTING=ON
          -DCMAKE_CXX_FLAGS="--coverage"

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 60

  test-clang:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq cmake ninja-build qt6-base-dev \
            qt6-declarative-dev qt6-tools-dev curl jq clang++

      - name: Download lingmo-theme
        run: |
          ASSETS=$(curl -s https://api.github.com/repos/Matrinsoft/lingmo-theme/releases/latest \
            | jq -r '.assets[] | select(.name | test("^liblingmotheme(1|-dev)") and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do
            curl -sL "$url" -o "/tmp/$(basename $url)"
          done
          dpkg -i /tmp/liblingmotheme*.deb 2>/dev/null || apt-get install -y -f

      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTING=ON
          -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 60
