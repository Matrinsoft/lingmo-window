name: Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deb:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq build-essential dpkg-dev debhelper \
            cmake qt6-base-dev qt6-declarative-dev curl jq

      - name: Download lingmo-theme
        run: |
          ASSETS=$(curl -s https://api.github.com/repos/Matrinsoft/lingmo-theme/releases/latest \
            | jq -r '.assets[] | select(.name | test("^liblingmotheme(1(?![0-9])|-dev)") and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do
            curl -sL "$url" -o "/tmp/$(basename $url)"
          done
          dpkg -i /tmp/liblingmotheme*.deb || apt-get install -y -f
          echo "=== Verifying lingmo-theme installation ==="
          ls -la /usr/lib/*/cmake/LingmoTheme/ 2>&1 || echo "No cmake files found"
          dpkg -l | grep lingmotheme

      - uses: actions/checkout@v4

      - name: Build Debian package
        run: dpkg-buildpackage -us -uc -b

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p artifacts
          mv ../*.deb ../*.buildinfo ../*.changes artifacts/ 2>/dev/null || true

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: lingmo-controls-deb
          path: artifacts/

  rpm:
    runs-on: ubuntu-24.04
    container: fedora:44

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y cmake qt6-qtbase-devel qt6-qtdeclarative-devel \
            rpm-build curl jq

      - name: Download lingmo-theme
        run: |
          ASSETS=$(curl -s https://api.github.com/repos/Matrinsoft/lingmo-theme/releases/latest \
            | jq -r '.assets[] | select(.name | test("^(lingmo-theme-(devel|libs))-\\d") and endswith(".rpm")) | .browser_download_url')
          for url in $ASSETS; do
            curl -sL "$url" -o "/tmp/$(basename $url)"
          done
          dnf install -y /tmp/lingmo-theme-*.rpm

      - uses: actions/checkout@v4

      - name: Build RPM package
        run: |
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          tar -czf ~/rpmbuild/SOURCES/lingmo-window-1.0.0.tar.gz \
            --transform='s,^\./,lingmo-window-1.0.0/,' \
            --show-transformed-names .
          cp rpm/lingmo-window.spec ~/rpmbuild/SPECS/
          rpmbuild -ba ~/rpmbuild/SPECS/lingmo-window.spec
          mkdir -p artifacts
          cp ~/rpmbuild/RPMS/**/*.rpm artifacts/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: artifacts/
