name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq cmake ninja-build g++ qt6-base-dev \
            qt6-declarative-dev curl jq

      - name: Download lingmo-theme
        run: |
          ASSETS=$(curl -s https://api.github.com/repos/Matrinsoft/lingmo-theme/releases/latest \
            | jq -r '.assets[] | select(.name | test("^liblingmotheme(1|-dev)") and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do
            curl -sL "$url" -o "/tmp/$(basename $url)"
          done
          dpkg -i /tmp/liblingmotheme*.deb 2>/dev/null || apt-get install -y -f

      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DLINGMO_ENABLE_UNITY_BUILD=ON
          -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build

      - name: Install
        run: cmake --install build --prefix /tmp/install

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: /tmp/install
