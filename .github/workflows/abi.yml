name: ABI Compliance Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  abi-check:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq cmake ninja-build qt6-base-dev \
            qt6-declarative-dev abi-compliance-checker curl jq

      - name: Download lingmo-theme
        run: |
          ASSETS=$(curl -s https://api.github.com/repos/Matrinsoft/lingmo-theme/releases/latest \
            | jq -r '.assets[] | select(.name | test("^liblingmotheme(1(?![0-9])|-dev)") and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do
            curl -sL "$url" -o "/tmp/$(basename $url)"
          done
          dpkg -i /tmp/liblingmotheme*.deb || apt-get install -y -f
          echo "=== Verifying lingmo-theme installation ==="
          ls -la /usr/lib/*/cmake/LingmoTheme/ 2>&1 || echo "No cmake files found"
          dpkg -l | grep lingmotheme

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build current branch
        run: |
          cmake -B build-current -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build-current

      - name: Checkout base branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          git checkout $BASE -- .
          cmake -B build-base -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build-base

      - name: Run ABI compliance check
        run: |
          abi-compliance-checker -lib libLingmoWindow.so.1 \
            -old build-base/src/Core/libLingmoWindow.so \
            -new build-current/src/Core/libLingmoWindow.so \
            -headers include/ \
            -report-path abi-report.html || true

      - uses: actions/upload-artifact@v4
        with:
          name: abi-report
          path: abi-report.html
